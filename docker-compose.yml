version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schf-migration-backend
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./backend:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY}
      - APP_URL=http://localhost:8001
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-schf_migration}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - SCHF_CORE_URL=${SCHF_CORE_URL:-http://host.docker.internal:8000}
      - SCHF_CORE_API_KEY=${SCHF_CORE_API_KEY:-}
    depends_on:
      - postgres
    networks:
      - schf-migration

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schf-migration-frontend
    restart: unless-stopped
    ports:
      - "3001:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001/api
    depends_on:
      - backend
    networks:
      - schf-migration

  postgres:
    image: postgres:16-alpine
    container_name: schf-migration-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE:-schf_migration}
      - POSTGRES_USER=${DB_USERNAME:-root}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - schf-migration

  redis:
    image: redis:7-alpine
    container_name: schf-migration-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - schf-migration

volumes:
  postgres_data:

networks:
  schf-migration:
    driver: bridge
