services:
  migration-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: migration-backend
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www/html
      - migration_backend_vendor:/var/www/html/vendor
    environment:
      APP_NAME: "SCHF Migration"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-}
      APP_URL: http://localhost:8001
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-migration-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-schf_migration}
      DB_USERNAME: ${DB_USERNAME:-schf}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      REDIS_HOST: migration-redis
      REDIS_PORT: 6379
      MIGRATION_SYNTHETIC_ONLY: "true"
      FEATURE_REAL_CONNECTORS: "false"
    depends_on:
      - migration-postgres
      - migration-redis
    networks:
      - schf-migration

  migration-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: migration-frontend
    restart: unless-stopped
    ports:
      - "3001:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001/api
    depends_on:
      - migration-backend
    networks:
      - schf-migration

  migration-postgres:
    image: postgres:16-alpine
    container_name: migration-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE:-schf_migration}
      - POSTGRES_USER=${DB_USERNAME:-schf}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change_me}
    volumes:
      - migration_postgres_data:/var/lib/postgresql/data
    networks:
      schf-migration:
        aliases:
          - postgres

  migration-redis:
    image: redis:7-alpine
    container_name: migration-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      schf-migration:
        aliases:
          - redis

volumes:
  migration_backend_vendor:
  migration_postgres_data:

networks:
  schf-migration:
    driver: bridge
